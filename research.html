<p>Coming Soon… <!-- 
I study how Earth systems respond to natural and human-driven change, combining field observation, laboratory analysis, and quantitative modeling. My work spans a range of environments — from Arctic riverbanks to urban watersheds — with the goal of understanding the processes that shape our planet and informing how we manage it.

---

## Southern Ocean Physics

**Sediment Transport Dynamics in Arctic River Systems**
Permafrost degradation is fundamentally reshaping the hydrology of high-latitude landscapes. This project examines how thawing permafrost alters sediment supply, channel geometry, and downstream sediment flux across a network of sub-Arctic rivers in Alaska. Using a combination of repeat field surveys, remote sensing, and sediment fingerprinting, I track how erosion hotspots migrate seasonally and how these signals propagate through river systems.
[View project →](#)

**Carbon Export from Thawing Permafrost Catchments**
As permafrost thaws, vast stores of ancient organic carbon become vulnerable to mobilization and decomposition. This project quantifies dissolved and particulate organic carbon fluxes from permafrost-dominated catchments and examines how hydrological connectivity and seasonal freeze-thaw cycles modulate carbon export to Arctic rivers and coastal margins.
[View project →](#)

---

## Paleoclimate & Earth History

**Paleoclimate Reconstruction from Lacustrine Sediment Cores**
Understanding future climate requires a deep record of the past. This project reconstructs Holocene climate variability in the Pacific Northwest using sediment cores extracted from alpine lakes. I analyze stable isotopes, grain size distributions, and biogenic silica concentrations to identify centennial-scale shifts in temperature and hydroclimate, contributing to a more spatially resolved picture of post-glacial environmental change.
[View project →](#)

**Volcanic Ash Records as Stratigraphic and Climatic Markers**
Tephra layers preserved in lake and bog sediments serve as precise chronological anchors and proxies for past volcanic activity. This project catalogs tephra deposits across a network of sediment archives in the Pacific Northwest, linking eruption histories to downstream environmental responses including vegetation shifts and geochemical perturbations in catchment soils.
[View project →](#)

---

## Dryland & Semiarid Environments

**Land Surface–Atmosphere Feedbacks in Dryland Ecosystems**
Drylands cover over 40% of Earth's land surface and are highly sensitive to both climate variability and land use change. This project investigates how vegetation loss and soil crust degradation alter surface energy partitioning and boundary layer dynamics in semi-arid regions of the American Southwest, quantifying the degree to which surface degradation amplifies local warming and suppresses convective rainfall.
[View project →](#)

---

## Coastal & Wetland Biogeochemistry

**Trace Metal Cycling in Coastal Wetland Soils**
Coastal wetlands are biogeochemically dynamic environments where frequent flooding and drainage cycles drive rapid shifts in soil redox conditions. This project examines how redox fluctuations control the mobility and speciation of trace metals — including iron, manganese, and arsenic — in tidal marsh soils along the mid-Atlantic coast, with attention to how sea level rise and saltwater intrusion may alter contaminant behavior.
[View project →](#)

**Nitrogen Dynamics at the Freshwater–Saltwater Interface**
Tidal wetlands play a critical role in intercepting and transforming nitrogen before it reaches coastal waters. This project traces nitrogen cycling pathways — including nitrification, denitrification, and anaerobic ammonium oxidation — across salinity gradients in estuarine marshes, assessing how hydrological modifications and nutrient loading alter the wetland's capacity to buffer coastal eutrophication.
[View project →](#)

---

## Urban Water & Contaminant Transport

**Microplastic Dispersal in Urban Stormwater Systems**
Microplastics have emerged as a pervasive contaminant in freshwater systems, yet their transport dynamics remain poorly understood at the watershed scale. This project tracks microplastic dispersal through urban stormwater infrastructure in a mid-sized northeastern city, combining event-based water sampling, particle size analysis, and polymer identification via FTIR spectroscopy.
[View project →](#)
