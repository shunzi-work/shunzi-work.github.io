<p>Coming Soon… <!-- 
AABW is formed through two broadly distinct pathways. The first — shelf-based formation — involves the production of dense High Salinity Shelf Water (HSSW) on the Antarctic continental shelves, where intense sea-ice formation and brine rejection generate waters dense enough to cascade down the continental slope and ventilate the abyss. The second pathway operates in the open ocean and is intimately connected to the phenomenon of open-ocean deep convection. Under certain preconditioning states, characterised by weakened upper-ocean stratification and the presence of relatively warm, salty Circumpolar Deep Water (CDW) close to the surface, the water column can become gravitationally unstable over areas tens to hundreds of kilometres in diameter. The ensuing convective overturning can penetrate to depths of several kilometres, homogenising the water column and generating dense waters that contribute to AABW production. Such deep convective events are spatially associated with open-ocean polynyas — anomalously large, seasonally recurring or persistent areas of open water embedded within the winter sea-ice pack.

The most dramatic historical example of an open-ocean polynya is the Weddell Polynya, a vast opening in the winter sea ice of the Weddell Sea that persisted for three consecutive winters between 1974 and 1976, reaching areal extents of up to approximately 300,000 km². First detected in satellite passive microwave imagery, the Weddell Polynya represented a direct oceanic window to the atmosphere, through which enormous amounts of heat were lost from the ocean to the atmosphere, cooling the surface mixed layer and driving convection to depths in excess of 2,000–3,000 m. The event constituted a major perturbation to Southern Ocean water-mass structure, with consequences for AABW production that persisted for decades. After 1976, the Weddell Polynya largely disappeared, not to reappear at comparable scale until a series of smaller openings in 2016 and 2017 briefly captured scientific attention and renewed interest in the phenomenon. These more recent occurrences, however, remain inadequately explained in terms of their triggering mechanisms and relationship to longer-term climate variability, underscoring a fundamental gap in our understanding.

The scientific importance of Southern Ocean polynyas and open-ocean deep convection extends well beyond their dramatic visual appearance in sea-ice satellite imagery. The convective overturning associated with large polynyas releases heat stored in CDW to the atmosphere, acting as a deep ocean heat pump that modulates the rate at which the Southern Ocean buffers anthropogenic warming. Simultaneously, the vigorous vertical mixing exposes deep, carbon-rich waters to the atmosphere, with complex and potentially opposing effects on air-sea carbon dioxide fluxes. The dense waters formed during convective events contribute directly to AABW and to the ventilation of the global ocean interior, with implications for the ocean's long-term capacity to store heat and carbon. Changes in the frequency, intensity, or spatial distribution of these convective events under anthropogenic forcing therefore carry profound consequences for climate projections on centennial and longer timescales.

Despite their importance, Southern Ocean open-ocean polynyas and deep convection remain poorly constrained by observations. The Southern Ocean is notoriously under-sampled, owing to its remoteness, harsh weather, seasonal sea-ice cover, and the associated difficulty of sustained in-situ measurements. The historical record of polynya occurrence is largely limited to the satellite era (post-1970s), and even within this period the observational record is fragmentary. The 1970s Weddell Polynya is the only large open-ocean polynya for which any sustained observational record exists, and comprehensive hydrographic measurements of the contemporaneous deep convection are essentially absent. Mooring and float-based observations in polynya-prone regions of the Weddell and Maud Rise area have expanded significantly in recent decades, providing new insights into preconditioning, triggering, and the structure of convective events. Nevertheless, the rarity and unpredictability of large polynya events mean that targeted observational campaigns remain challenging to plan and execute, and the available data cannot adequately constrain the statistics of deep convection across the Southern Ocean.

In the absence of dense observations, climate models represent an indispensable tool for studying Southern Ocean deep convection. Models can be used to examine the multi-decadal to centennial variability of polynyas, probe the sensitivity of convective activity to changes in atmospheric forcing and ocean state, and assess the role of these events in shaping the large-scale climate. Yet here lies a central tension in the literature: the representation of open-ocean polynyas and deep convection in climate models is notoriously inconsistent and poorly validated. Some models exhibit persistent, vigorous open-ocean convection in the Weddell Sea and elsewhere in the Southern Ocean, producing polynya-like features that bear little resemblance to the sporadic occurrences seen in observations. Others produce little or no open-ocean deep convection at all, relying entirely on shelf processes for AABW formation. This inter-model spread is not merely an inconvenience — it reflects genuine uncertainty about the physical processes governing deep convection, their sensitivity to parameterisation choices, and the degree to which models faithfully capture the preconditioning of the water column and its interaction with atmospheric variability. --></p>

              citeDiv.innerHTML = biblioDiv.innerHTML;
            }
            popup.appendChild(citeDiv);
          });
          return popup.innerHTML;
        });
      }
    }
  });
